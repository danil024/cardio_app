name: cardio_app
description: Heart rate monitor app for GEOID HS500 sensor.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_blue_plus: ^1.32.0
  flutter_tts: ^4.0.0
  audioplayers: ^6.0.0
  fl_chart: ^0.66.0
  path_provider: ^2.1.0
  shared_preferences: ^2.2.0
  equatable: ^2.0.5
  bloc: ^8.1.0
  flutter_bloc: ^8.1.0
  uuid: ^4.2.0
  wakelock_plus: ^1.2.0
  share_plus: ^12.0.1
  file_picker: ^10.3.10

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
